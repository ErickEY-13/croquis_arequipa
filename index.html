<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arequipa Para Ti</title>
  <meta name="description" content="Croquis interactivo de lugares turísticos de Arequipa, hecho con amor." />

  <!-- Fonts: Inter (Apple-like) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- SPLASH -->
  <div id="splash" class="splash">
    <div class="splash-content">
      <div class="splash-icon">
        <i data-lucide="heart" class="splash-heart-icon"></i>
      </div>
      <h1 class="splash-title">Arequipa</h1>
      <p class="splash-sub">Para Ti</p>
      <button id="splash-btn" class="splash-btn" onclick="closeSplash()">
        <span>Explorar</span>
        <i data-lucide="arrow-right" class="btn-icon"></i>
      </button>
    </div>
  </div>

  <!-- HEADER -->
  <header id="app-header" class="header">
    <div class="header-left">
      <div class="logo">
        <i data-lucide="map-pin" class="logo-icon"></i>
        <span class="logo-text">Arequipa</span>
      </div>
    </div>
    <div class="header-center">
      <div class="search-box">
        <i data-lucide="search" class="search-icon"></i>
        <input type="text" id="search-input" placeholder="Buscar lugar..." autocomplete="off" />
        <div id="search-results" class="search-results"></div>
      </div>
    </div>
    <div class="header-right">
      <button id="btn-locate" class="btn-action" title="Encontrar lugar más cercano">
        <i data-lucide="navigation" class="action-icon"></i>
        <span class="btn-label">Mi ubicación</span>
      </button>
      <button id="btn-sidebar" class="btn-action btn-icon-only" title="Filtros">
        <i data-lucide="sliders-horizontal" class="action-icon"></i>
      </button>
    </div>
  </header>

  <!-- CATEGORIES FILTER -->
  <div class="categories-bar">
    <div id="categories-container" class="categories-container"></div>
  </div>

  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h2>Filtros</h2>
      <button id="btn-close-sidebar" class="btn-close">
        <i data-lucide="x" class="close-icon"></i>
      </button>
    </div>

    <div class="sidebar-section">
      <h3>
        <i data-lucide="tag" class="section-icon"></i>
        Tipo de acceso
      </h3>
      <div class="filter-chips" id="filter-tipo">
        <button class="chip active" data-filter="todos">Todos</button>
        <button class="chip" data-filter="Gratis">Gratis</button>
        <button class="chip" data-filter="Paga">De pago</button>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>
        <i data-lucide="layers" class="section-icon"></i>
        Categoría
      </h3>
      <div class="filter-chips" id="filter-categoria">
        <button class="chip active" data-filter="todos">Todas</button>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>
        <i data-lucide="bar-chart-3" class="section-icon"></i>
        Estadísticas
      </h3>
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-number" id="stat-total">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="stat-gratis">0</span>
          <span class="stat-label">Gratis</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="stat-paga">0</span>
          <span class="stat-label">De pago</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="stat-visible">0</span>
          <span class="stat-label">Visibles</span>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>
        <i data-lucide="list" class="section-icon"></i>
        Lugares <span id="list-count" class="list-count"></span>
      </h3>
      <div id="places-list" class="places-list"></div>
    </div>
  </aside>

  <!-- OVERLAY -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- WEATHER WIDGET -->
  <div id="weather-widget" class="weather-widget hidden">
    <i data-lucide="sun" id="weather-icon" class="weather-icon"></i>
    <span id="weather-temp" class="weather-temp">--°C</span>
    <span class="weather-city">Arequipa</span>
  </div>

  <!-- DETAIL CARD -->
  <div id="detail-card" class="detail-card">
    <img id="detail-image" class="detail-header-image" src="" alt="Lugar" style="display:none;" onerror="this.style.display='none'" />
    <div class="detail-accent" id="detail-accent"></div>
    <button id="btn-close-detail" class="btn-close-sm">
      <i data-lucide="x" class="close-icon-sm"></i>
    </button>
    <div class="detail-header">
      <div class="detail-badge" id="detail-badge"></div>
      <span class="detail-dist-badge" id="detail-dist-badge"></span>
    </div>
    <h2 id="detail-name" class="detail-name"></h2>
    <p id="detail-desc" class="detail-desc"></p>
    <div class="detail-info-grid">
      <div class="info-chip">
        <i data-lucide="clock" class="info-chip-icon"></i>
        <span id="detail-horario"></span>
      </div>
      <div class="info-chip">
        <i data-lucide="wallet" class="info-chip-icon"></i>
        <span id="detail-precio"></span>
      </div>
    </div>
    <div class="detail-actions">
      <a id="detail-directions" class="btn-directions" href="#" target="_blank" rel="noopener" title="Abrir en Google Maps">
        <i data-lucide="navigation" class="btn-dir-icon"></i>
        <span>Cómo llegar</span>
      </a>
      <button id="btn-draw-route" class="btn-maps-secondary" title="Dibujar ruta aquí">
        <i data-lucide="route" class="btn-dir-icon"></i>
        <span>Ruta en mapa</span>
      </button>
      <a id="detail-maps" class="btn-maps-icon" href="#" target="_blank" rel="noopener" title="Ver en Google Maps">
        <i data-lucide="map" class="btn-dir-icon" style="margin:0;"></i>
      </a>
    </div>
  </div>

  <!-- NEAREST PANEL -->
  <div id="nearest-panel" class="nearest-panel">
    <button id="btn-close-nearest" class="btn-close-sm">
      <i data-lucide="x" class="close-icon-sm"></i>
    </button>
    <h3>
      <i data-lucide="navigation" class="panel-icon"></i>
      Lugares más cercanos
    </h3>
    <div id="nearest-list" class="nearest-list"></div>
  </div>

  <!-- EASTER EGG MODAL -->
  <div id="love-modal" class="love-modal">
    <div class="love-modal-content">
      <button id="btn-close-love" class="btn-close-sm" style="top: 12px; right: 12px; background: var(--pink-50);">
        <i data-lucide="x" class="close-icon-sm" style="color: var(--pink-500);"></i>
      </button>
      <div id="love-modal-inner"></div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>

</body>
</html>
